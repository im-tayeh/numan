<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>مركز النعمان بن مقرن · بوابة اللجان</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#16294D">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="النعمان">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1F3A6B; --navy-deep:#16294D; --navy-soft:#E8EDF5;
    --gold:#C9A24B; --gold-soft:#F4EEDD;
    --bg:#F4F6F9; --surface:#FFFFFF; --ink:#1E2733; --muted:#66707D; --line:#E6E9EF;
    --good:#1E7A48; --good-bg:#E6F1EA; --mid:#B5872B; --mid-bg:#F6EEDA; --bad:#B23B3B; --bad-bg:#FBE9E9;
    --shadow:0 1px 2px rgba(31,58,107,.04),0 6px 18px rgba(31,58,107,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:"IBM Plex Sans Arabic",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;font-size:16px;min-height:100vh}
  h1,h2,h3{margin:0;font-weight:600}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:16px;color:var(--ink)}

  .topbar{background:var(--navy-deep);color:#fff;padding:11px 15px;display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:30}
  .brand{display:flex;align-items:center;gap:9px;min-width:0}
  .brand img{height:38px;background:#fff;border-radius:7px;padding:2px;flex-shrink:0}
  .brand h1{font-size:15px;color:#fff;line-height:1.2}
  .brand small{display:block;font-size:11px;color:#b9c6df;font-weight:400}
  .rolebadge{background:var(--gold);color:#3d2f0c;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}
  .btn-ghost{background:rgba(255,255,255,.14);color:#fff;padding:6px 11px;border-radius:9px;font-size:13px;flex-shrink:0}

  .tabrow{max-width:680px;margin:0 auto;padding:12px 15px 0;display:flex;gap:6px}
  .tab{flex:1;background:transparent;color:var(--muted);padding:9px;border-radius:10px;font-weight:600;font-size:14px;border:1px solid transparent}
  .tab.on{background:var(--surface);color:var(--navy-deep);border-color:var(--line);box-shadow:var(--shadow)}

  .wrap{max-width:680px;margin:0 auto;padding:8px 15px 80px}
  .pane{display:none}.pane.on{display:block}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:11px;box-shadow:var(--shadow)}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .ttl{font-weight:600;font-size:15px}
  .by{font-size:12px;color:var(--muted);margin-top:2px}
  .det{font-size:13px;color:var(--muted);margin-top:7px;line-height:1.8}
  .stbadge{font-size:12px;font-weight:700;padding:3px 11px;border-radius:20px;flex-shrink:0}
  .stbadge.pending{background:var(--mid-bg);color:var(--mid)}
  .stbadge.approved{background:var(--good-bg);color:var(--good)}
  .stbadge.rejected{background:var(--bad-bg);color:var(--bad)}
  .conflict{background:var(--bad-bg);color:var(--bad);border-radius:9px;padding:8px 11px;margin-top:9px;font-size:13px;font-weight:600}
  .notebox{background:#fbfcfe;border:1px solid var(--line);border-radius:9px;padding:8px 11px;margin-top:9px;font-size:13px;line-height:1.7}
  .acts{display:flex;gap:8px;margin-top:11px}
  .acc{flex:1;background:var(--good-bg);color:var(--good);font-weight:700;padding:10px;border-radius:10px;font-size:14px}
  .rej{flex:1;background:var(--bad-bg);color:var(--bad);font-weight:700;padding:10px;border-radius:10px;font-size:14px}

  .dayhdr{font-weight:700;color:var(--navy-deep);margin:16px 0 2px;font-size:15px}
  .slot{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-top:8px;box-shadow:var(--shadow)}
  .slot.clash{border-color:var(--bad);background:#fdf2f2}
  .slot .tm{font-weight:700;color:var(--navy-deep);font-size:13px;direction:ltr;flex-shrink:0;min-width:88px}
  .slot .info{flex:1}.slot .info .n{font-weight:600;font-size:14px}.slot .info .s{font-size:12px;color:var(--muted)}

  .facadd{display:flex;gap:8px;margin-top:11px;align-items:center;flex-wrap:wrap}
  .facadd input{flex:1;min-width:140px;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:var(--surface)}
  .facadd label{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
  .facadd button{background:var(--navy);color:#fff;font-weight:600;padding:0 18px;border-radius:10px}
  .facrow{display:flex;align-items:center;justify-content:space-between;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-top:8px}
  .facrow .x{color:var(--bad);font-size:18px}
  .miniflag{font-size:11px;padding:1px 8px;border-radius:20px;background:var(--navy-soft);color:var(--navy-deep)}

  .sheet-bg{position:fixed;inset:0;background:rgba(22,41,77,.5);display:flex;align-items:flex-end;justify-content:center;z-index:55}
  .sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:680px;max-height:90vh;overflow-y:auto}
  @media(min-width:560px){.sheet-bg{align-items:center}.sheet{border-radius:20px}}
  .sheet h3{font-size:17px;color:var(--navy-deep)}
  .sheet .who{color:var(--muted);font-size:13px;margin:2px 0 14px}
  .sheet textarea{width:100%;min-height:90px;padding:12px;border:1px solid var(--line);border-radius:11px;background:#fbfcfe;line-height:1.8;resize:vertical}
  .sheet textarea:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(31,58,107,.13)}
  .mbtns{display:flex;gap:8px;margin-top:12px}
  .mbtns .b{flex:1;padding:13px;border-radius:12px;font-weight:600;font-size:15px}
  .b.primary{background:var(--navy);color:#fff}.b.sec{background:var(--navy-soft);color:var(--navy-deep)}

  .login-screen{min-height:100vh;display:grid;place-items:center;padding:24px}
  .login-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:32px 28px;width:100%;max-width:370px;text-align:center}
  .login-card img{height:104px;margin:0 auto 12px;display:block}
  .login-card h1{font-size:20px;color:var(--navy-deep)}
  .login-card p{color:var(--muted);font-size:14px;margin:4px 0 20px}
  .login-card .f{text-align:right;margin-bottom:13px}
  .login-card label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--muted)}
  .login-card input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:#fbfcfe}
  .login-card .lbtn{width:100%;margin-top:6px;background:var(--navy);color:#fff;padding:13px;border-radius:11px;font-weight:600;font-size:15px}
  .msg{font-size:14px;margin-top:12px;padding:10px;border-radius:9px;display:none}
  .msg.err{display:block;background:var(--bad-bg);color:var(--bad)}

  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 22px;border-radius:12px;font-size:15px;box-shadow:0 8px 24px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:.25s;z-index:80;max-width:90%;text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  #toast.bad{background:var(--bad)}
  .rlbl{display:block;font-size:13px;font-weight:600;margin:10px 0 6px;color:var(--muted)}
  .seg2{display:flex;gap:8px}
  .segb{flex:1;padding:10px;border:1.5px solid var(--line);border-radius:10px;background:#fbfcfe;color:var(--muted);font-weight:600}
  .segb.on{background:var(--navy-soft);border-color:var(--navy);color:var(--navy-deep)}
  .tgl{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500;background:#fbfcfe;border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin:11px 0;cursor:pointer}
  .tgl input{width:20px;height:20px;accent-color:var(--navy)}
  .repcard{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:13px;margin-top:10px;box-shadow:var(--shadow)}
  .repcard .rh{display:flex;justify-content:space-between;align-items:center;font-weight:700;color:var(--navy-deep)}
  .repcard .cnt{background:var(--navy-soft);color:var(--navy-deep);border-radius:20px;padding:2px 11px;font-size:13px}
  .arow{display:flex;align-items:center;gap:9px;border-top:1px solid var(--line);padding:9px 0}
  .arow .ai{flex:1}.arow .an{font-weight:600;font-size:14px}.arow .as{font-size:12px;color:var(--muted)}
  .revbtn{background:var(--gold-soft);color:#8a6d2a;font-weight:600;padding:7px 12px;border-radius:9px;font-size:13px;flex-shrink:0}
  .revdone{color:var(--good);font-size:12px;font-weight:700;flex-shrink:0}
  .reqfilter{display:flex;gap:6px;flex-wrap:wrap;margin:12px 0 4px}
  .rfb{padding:7px 13px;border:1.5px solid var(--line);border-radius:9px;background:#fbfcfe;color:var(--muted);font-weight:600;font-size:13px}
  .rfb.on{background:var(--navy-soft);border-color:var(--navy);color:var(--navy-deep)}
  .eyebtn{background:var(--navy-soft);color:var(--navy-deep);font-weight:600;font-size:12px;padding:5px 11px;border-radius:8px}
  /* detail modal */
  .det-bg{position:fixed;inset:0;background:rgba(22,41,77,.55);display:grid;place-items:center;z-index:85;padding:18px}
  .det-card{background:#fff;border-radius:18px;max-width:460px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 -10px 40px rgba(0,0,0,.3)}
  .det-head{background:var(--navy-deep);color:#fff;padding:16px 18px;border-radius:18px 18px 0 0;position:sticky;top:0}
  .det-head h3{font-size:17px;margin:0}.det-head .s{font-size:12.5px;color:#b9c6df;margin-top:3px}
  .det-body{padding:16px 18px}
  .drow{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
  .drow .k{color:var(--muted);min-width:96px}.drow .v{color:var(--ink);font-weight:500;flex:1}
  .dbox{border-radius:11px;padding:11px 13px;margin-top:11px;font-size:13.5px}
  .dbox.viol{background:var(--bad-bg);border:1px solid #f0c9c9;color:#8a2b2b}
  .dbox.note{background:#f3f6fb;border:1px solid var(--line);color:var(--ink)}
  .dbox.ok{background:var(--good-bg);border:1px solid #bfe0cc;color:var(--good)}
  .dbox b{display:block;margin-bottom:3px}
  .det-close{margin:4px 18px 18px;width:calc(100% - 36px);padding:12px;border-radius:11px;background:var(--navy-soft);color:var(--navy-deep);font-weight:600;border:none;cursor:pointer}
  /* notifications */
  .notif-btn{position:relative;background:rgba(255,255,255,.14);color:#fff;width:34px;height:34px;border-radius:9px;font-size:16px;border:none;cursor:pointer}
  .notif-dot{position:absolute;top:-4px;left:-4px;background:var(--bad);color:#fff;font-size:10px;font-weight:700;min-width:17px;height:17px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
  .ntask{background:#fbfcfe;border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:11px}
  .ntask .nt-t{font-weight:700;color:var(--navy-deep)}
  .ntask .nt-d{font-size:13px;color:var(--muted);margin-top:3px}
  .nt-pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px}
  .nt-pill.open{background:var(--mid-bg);color:var(--mid)}.nt-pill.done{background:var(--good-bg);color:var(--good)}
  .nt-pill.deferred{background:#e9eef6;color:#3f5a86}.nt-pill.rejected{background:var(--bad-bg);color:var(--bad)}
  .nt-rep{background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 9px;margin-top:7px;font-size:13px}
  .nt-acts{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .nt-acts button{flex:1;min-width:84px;padding:8px;border-radius:9px;font-weight:600;font-size:12.5px;border:1px solid var(--line);background:#fff;cursor:pointer}
  .nt-acts .bd{color:var(--good);border-color:#bfe0cc}.nt-acts .bf{color:#3f5a86}.nt-acts .br{color:var(--bad);border-color:#f0c9c9}
  .empty{text-align:center;color:var(--muted);padding:40px 16px}
  .hide{display:none !important}
  .prof-bg{position:fixed;inset:0;background:rgba(22,41,77,.5);display:grid;place-items:center;z-index:90;padding:20px}
  .prof-card{background:#fff;border-radius:18px;padding:24px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;box-shadow:0 -10px 40px rgba(0,0,0,.3)}
  .prof-card h3{font-size:18px;color:#16294D;margin:0 0 12px}.prof-card h4{font-size:14px;color:#16294D;margin:0 0 10px}
  .prof-info{display:flex;flex-direction:column;gap:7px;font-size:14px}
  .prof-info .r{display:flex;justify-content:space-between;gap:10px}.prof-info .r b{color:#16294D}.prof-info .r span{color:#66707D}
  .prof-hr{border:none;border-top:1px solid #E6E9EF;margin:16px 0}
  .prof-card input{width:100%;padding:11px 12px;border:1px solid #E6E9EF;border-radius:10px;background:#fbfcfe;margin-bottom:10px;font-size:16px;font-family:inherit;box-sizing:border-box}
  .prof-card input:focus{outline:none;border-color:#1F3A6B;box-shadow:0 0 0 3px rgba(31,58,107,.13)}
  .prof-btns{display:flex;gap:8px;margin-top:4px}
  .pbtn{flex:1;padding:12px;border-radius:11px;font-weight:600;font-size:15px;border:none;cursor:pointer;font-family:inherit}
  .pbtn.primary{background:#1F3A6B;color:#fff}.pbtn.sec{background:#E8EDF5;color:#16294D}
  .prof-msg{font-size:13px;margin-top:10px;padding:9px;border-radius:8px;display:none}
  .prof-msg.ok{display:block;background:#E6F1EA;color:#1E7A48}.prof-msg.err{display:block;background:#FBE9E9;color:#B23B3B}
  .prof-btn{background:rgba(255,255,255,.14);color:#fff;width:34px;height:34px;border-radius:9px;font-size:16px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;border:none;cursor:pointer}

img[src="logo.png"]{background:#fff;padding:3px;box-sizing:border-box}
</style>
<style id="numanPolish">
/* ===== طبقة التحسين البصري الموحدة (النعمان) ===== */
*{-webkit-tap-highlight-color:transparent}
::selection{background:var(--gold-soft);color:var(--navy-deep)}
html{scrollbar-width:thin;scrollbar-color:#cfd6e2 transparent}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#cfd6e2;border-radius:20px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:#b6c0d2;background-clip:padding-box}
/* الإدخالات: أنظف، أوضح، أكثر تفاعلا */
.field input:not([type=checkbox]):not([type=radio]),
.field select,.field textarea,.login-card input{
  border:1.5px solid var(--line);border-radius:11px;background:var(--surface);color:var(--ink);
  transition:border-color .18s ease,box-shadow .18s ease,background .18s ease;
  box-shadow:inset 0 1px 2px rgba(31,58,107,.035);
}
.field input::placeholder,.field textarea::placeholder,.login-card input::placeholder{color:#9aa3b0}
.field input:not([type=checkbox]):not([type=radio]):hover,
.field select:hover,.field textarea:hover,.login-card input:hover{border-color:#bcc6d6;background:#fcfdff}
.field input:not([type=checkbox]):not([type=radio]):focus,
.field select:focus,.field textarea:focus,.login-card input:focus{
  outline:none;border-color:var(--navy);background:var(--surface);
  box-shadow:0 0 0 3.5px rgba(31,58,107,.14),0 2px 6px rgba(31,58,107,.08);
}
.field select{cursor:pointer}
/* الأزرار: عمق وتفاعل لطيف */
.btn,.lbtn{transition:filter .18s ease,box-shadow .2s ease,transform .12s ease}
.btn:hover,.lbtn:hover{filter:brightness(1.07);box-shadow:0 5px 16px rgba(31,58,107,.20)}
.btn:active,.lbtn:active{transform:translateY(1px);box-shadow:0 2px 8px rgba(31,58,107,.16)}
/* تركيز ذهبي واضح لإمكانية الوصول */
a:focus-visible,button:focus-visible,.tab:focus-visible,[tabindex]:focus-visible{
  outline:2.5px solid var(--gold);outline-offset:2px;border-radius:8px;
}
/* احترام تقليل الحركة */
@media (prefers-reduced-motion:reduce){*{transition:none !important;animation:none !important;scroll-behavior:auto !important}}
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <img src="logo.png" alt="مركز النعمان بن مقرن" />
    <h1>بوابة اللجان</h1>
    <p>مركز النعمان بن مقرن</p>
    <div class="f"><label>اسم المستخدم</label><input type="text" id="loginCode" placeholder="مثال: SD551" /></div>
    <div class="f"><label>كلمة المرور</label><input type="password" id="loginPass" placeholder="••••••" /></div>
    <button class="lbtn" id="loginBtn">دخول</button>
    <div class="msg" id="loginMsg"></div>
    <a href="index.html" style="display:block;text-align:center;margin-top:14px;color:var(--navy);font-size:13.5px;font-weight:600;text-decoration:none">↪ الدخول الموحّد لكل البوابات</a>
  </div>
</div>

<div id="app" class="hide">
  <header class="topbar">
    <div class="brand">
      <img src="logo.png" alt="المركز" />
      <div><h1 id="hCom">لجنة الأنشطة<small id="hWho"></small></h1></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="rolebadge" id="roleBadge"></span>
      <button class="notif-btn" id="notifBtn" title="المهام والإشعارات">🔔<span class="notif-dot hide" id="notifDot">0</span></button><button class="prof-btn" id="profBtn" title="الملف الشخصي">⚙️</button><button id="switchPortalBtn" class="btn-ghost hide" onclick="location.href='index.html'" title="تغيير البوابة" style="margin-inline-end:6px">البوابات</button><button class="btn-ghost" id="logoutBtn">خروج</button>
    </div>
  </header>

  <div class="tabrow">
    <button class="tab on" data-pane="reqs">الطلبات</button>
    <button class="tab" data-pane="sched">الجدول</button>
    <button class="tab" data-pane="reports">التقارير</button>
    <button class="tab" data-pane="facs" id="tabFacs">الإعدادات</button>
  </div>

  <main class="wrap">
    <section class="pane on" id="pane-reqs">
      <div class="reqfilter" id="reqFilter">
        <button class="rfb on" data-f="pending">قيد المراجعة</button>
        <button class="rfb" data-f="approved">المقبولة</button>
        <button class="rfb" data-f="rejected">المرفوضة</button>
        <button class="rfb" data-f="all">الكل</button>
      </div>
      <div id="reqList"></div>
    </section>
    <section class="pane" id="pane-sched"><div id="schedList"></div></section>
    <section class="pane" id="pane-reports">
      <div class="reqfilter" id="repGroup" style="margin-top:12px">
        <button class="rfb on" data-g="month">حسب الشهر</button>
        <button class="rfb" data-g="week">حسب الأسبوع</button>
        <button class="rfb" data-g="stage">حسب المرحلة</button>
      </div>
      <div class="field" style="max-width:260px;margin-top:6px"><label style="font-size:12px;color:var(--muted)">نوع النشاط</label><select id="repType"></select></div>
      <div id="repBody"></div>
    </section>
    <section class="pane" id="pane-facs">
      <div class="card">
        <h3>إضافة مرفق</h3>
        <div class="facadd">
          <input type="text" id="facName" placeholder="اسم المرفق" />
          <button id="facAdd">إضافة</button>
        </div>
      </div>
      <div id="facList"></div>
    </section>
  </main>
</div>

<!-- DECISION SHEET -->
<div id="decModal" class="sheet-bg hide">

async function changePassword(){

  if(p1.length<6){msg.textContent="كلمة المرور 6 أحرف على الأقل.";msg.className="prof-msg err";return;}
  if(p1!==p2){msg.textContent="كلمتا المرور غير متطابقتين.";msg.className="prof-msg err";return;}
  const {error}=await sb.auth.updateUser({password:p1});
  if(error){msg.textContent="تعذر التغيير: "+error.message;msg.className="prof-msg err";return;}

function toast(t,bad){const e=$("toast");e.textContent=t;e.className="show"+(bad?" bad":"");setTimeout(()=>e.className="",2600);}
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

window.addEventListener("DOMContentLoaded",init);
async function init(){
  sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON,{auth:{storageKey:"numan-auth"}});
  window.__numanSb=sb; try{window.__numanToast=toast;}catch(e){}

  $("facAdd").onclick=addFacility;
  $("revSave").onclick=saveReview; $("revCancel").onclick=()=>$("revModal").classList.add("hide");

  $("notifBtn").onclick=openNotif; $("notifClose").onclick=()=>$("notifModal").classList.add("hide");
  $("reqFilter").querySelectorAll(".rfb").forEach(b=>b.onclick=()=>{reqFilter=b.dataset.f;$("reqFilter").querySelectorAll(".rfb").forEach(x=>x.classList.toggle("on",x===b));renderReqs();});
  $("repGroup").querySelectorAll(".rfb").forEach(b=>b.onclick=()=>{repGroup=b.dataset.g;$("repGroup").querySelectorAll(".rfb").forEach(x=>x.classList.toggle("on",x===b));renderReports();});
  $("repType").onchange=()=>{repType=$("repType").value;renderReports();};
  $("revViol").onchange=e=>$("revViolWrap").classList.toggle("hide",!e.target.checked);
  $("revOnTime").querySelectorAll(".segb").forEach(b=>b.onclick=()=>{$("revOnTime").querySelectorAll(".segb").forEach(x=>x.classList.remove("on"));b.classList.add("on");});
  let session=null;
  try{ const r=await window.NumanQueue.withTimeout(sb.auth.getSession(), 6000); session=r&&r.data&&r.data.session; }catch(e){}
  if(!session){ try{ const raw=JSON.parse(localStorage.getItem("numan-auth")||"null"); const s=raw&&(raw.access_token?raw:(raw.currentSession||raw.session)); if(s&&s.user) session=s; }catch(e){} }
  if(session) await enterApp(session);

async function doLogin(){
  $("loginMsg").className="msg";
  const code=$("loginCode").value.trim().toLowerCase(),pass=$("loginPass").value;
  if(!code||!pass)return errLogin("اكتب الكود وكلمة المرور.");
  $("loginBtn").disabled=true;$("loginBtn").textContent="جار الدخول…";
  const {data,error}=await sb.auth.signInWithPassword({email:code+DOMAIN,password:pass});
  $("loginBtn").disabled=false;$("loginBtn").textContent="دخول";
  if(error)return errLogin("الكود أو كلمة المرور غير صحيحة.");
  await enterApp(data.session);
}

/* ===== وحدة الدورات (اللجنة العلمية) #38 ===== */
let CRS=[], CR_STAFF={}, CR_STAGES=[], CR_LINKS={}, crEditId=null;
const CR_ST={active:"جارية",done:"منتهية",canceled:"ملغاة"};
const CR_CLR={active:"var(--good)",done:"#64748b",canceled:"var(--bad)"};
async function coursesBoot(){
  document.querySelector(".tabrow").classList.add("hide");
  document.querySelector(".wrap").innerHTML=`
  <style id="crCss">
   .crForm{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
   .crForm .f{display:flex;flex-direction:column;gap:4px}
   .crForm label{font-size:13px;color:var(--muted)}
   .crForm input,.crForm select{padding:9px;border:1px solid var(--line);border-radius:8px;background:var(--surface);color:var(--ink);font:inherit;width:100%}
   .crStages{display:flex;flex-wrap:wrap;gap:10px;padding:6px 0}
   .crStages label{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--ink)}
   .crTbl{width:100%;min-width:560px;border-collapse:collapse}
   .crTbl th,.crTbl td{padding:10px;text-align:right;border-bottom:1px solid var(--line);font-size:14px;vertical-align:top;word-break:break-word}
   .crForm input,.crForm select{max-width:100%}
   .crTbl th{color:var(--muted);font-weight:600;font-size:13px}
   .crpill{display:inline-block;padding:2px 12px;border-radius:999px;font-size:12px;color:#fff}
   .crlnk{background:none;border:none;color:var(--navy);cursor:pointer;font:inherit;font-size:13px;text-decoration:underline}
   .crlnk.del{color:var(--bad)}
   @media(max-width:640px){.crForm{grid-template-columns:1fr}}
  </style>
  <section class="pane on">
    <div class="card">
      <h3 id="crFormTitle">إضافة دورة</h3>
      <div class="crForm">
        <div class="f"><label>اسم الدورة</label><input type="text" id="crName" placeholder="نورانية / عليا…"/></div>
        <div class="f"><label>المدرس</label><select id="crInstr"></select></div>
        <div class="f"><label>الحالة</label><select id="crStatus"><option value="active">جارية</option><option value="done">منتهية</option><option value="canceled">ملغاة</option></select></div>
        <div class="f"><label>تاريخ البدء</label><input type="date" id="crStart"/></div>
        <div class="f"><label>المواعيد</label><input type="text" id="crSched" placeholder="السبت والثلاثاء ٤ عصرا"/></div>
        <div class="f"><label>المكان</label><input type="text" id="crPlace" placeholder="قاعة ١"/></div>
      </div>
      <label style="font-size:13px;color:var(--muted)">المراحل المستهدفة <span style="font-weight:400">(يحتاج اتصالا)</span></label>
      <div class="crStages" id="crStages"></div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="b primary" id="crSave">حفظ الدورة</button>
        <button class="b sec" id="crCancel" style="display:none">إلغاء التعديل</button>
      </div>
    </div>
    <div class="card">
      <h3>الدورات</h3>
      <div id="crList"></div>
    </div>
  </section>`;
  const r=await window.NumanQueue.load("courses_data", async()=>{
    const st=await sb.from("staff").select("code,full_name"); if(st.error) throw st.error;
    const sg=await sb.from("stages").select("id,name").order("id"); if(sg.error) throw sg.error;
    const cr=await sb.from("courses").select("*").order("id",{ascending:false}); if(cr.error) throw cr.error;
    const ln=await sb.from("course_stages").select("*"); if(ln.error) throw ln.error;
    return {staff:st.data||[], stages:sg.data||[], courses:cr.data||[], links:ln.data||[]};
  });
  const b=r.data||{staff:[],stages:[],courses:[],links:[]}; window.NumanQueue.banner(r.offline);
  CR_STAFF={}; (b.staff||[]).forEach(s=>CR_STAFF[s.code]=s.full_name);
  CR_STAGES=b.stages||[]; CRS=b.courses||[];
  CR_LINKS={}; (b.links||[]).forEach(l=>{(CR_LINKS[l.course_id]=CR_LINKS[l.course_id]||[]).push(l.stage_id);});
  $("crInstr").innerHTML='<option value="">— اختر المدرس —</option>'+Object.keys(CR_STAFF).map(c=>`<option value="${c}">${esc(CR_STAFF[c])}</option>`).join("");
  $("crStages").innerHTML=CR_STAGES.length?CR_STAGES.map(s=>`<label><input type="checkbox" class="crStg" value="${s.id}"/> ${esc(s.name)}</label>`).join(""):'<span style="color:var(--muted)">لا مراحل معرفة</span>';
  $("crSave").onclick=crSave; $("crCancel").onclick=crCancelEdit;
  if(!IS_LEAD){ $("crSave").style.display="none"; }
  crRender();
}
function crStageNames(cid){ return (CR_LINKS[cid]||[]).map(sid=>{const s=CR_STAGES.find(x=>x.id===sid);return s?s.name:"";}).filter(Boolean).join("، "); }
function crRender(){
  if(!CRS.length){ $("crList").innerHTML='<div class="empty">لا دورات بعد.</div>'; return; }
  $("crList").innerHTML=`<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table class="crTbl"><thead><tr><th>الدورة</th><th>المدرس</th><th>المواعيد</th><th>المكان</th><th>المراحل</th><th>الحالة</th>${IS_LEAD?"<th></th>":""}</tr></thead><tbody>`+CRS.map(c=>{
    const idArg=(typeof c.id==="string")?`'${c.id}'`:c.id;
    return `<tr>
      <td><b>${esc(c.name||"")}</b>${c.start_date?`<div style="color:var(--muted);font-size:12px">من ${c.start_date}</div>`:""}</td>
      <td>${esc(CR_STAFF[c.instructor_code]||c.instructor_code||"—")}</td>
      <td>${esc(c.schedule||"—")}</td>
      <td>${esc(c.place||"—")}</td>
      <td>${esc(crStageNames(c.id))||"—"}</td>
      <td><span class="crpill" style="background:${CR_CLR[c.status]||'#64748b'}">${CR_ST[c.status]||c.status}</span></td>
      ${IS_LEAD?`<td style="white-space:nowrap"><button class="crlnk" onclick="crEdit(${idArg})">تعديل</button> <button class="crlnk del" onclick="crDel(${idArg})">حذف</button></td>`:""}
    </tr>`;
  }).join("")+`</tbody></table></div>`;
}
function crClearForm(){ ["crName","crStart","crSched","crPlace"].forEach(i=>$(i).value=""); $("crStatus").value="active"; document.querySelectorAll(".crStg").forEach(c=>c.checked=false); }
function crCancelEdit(){ crEditId=null; $("crFormTitle").textContent="إضافة دورة"; $("crSave").textContent="حفظ الدورة"; $("crCancel").style.display="none"; crClearForm(); }
function crEdit(id){
  const c=CRS.find(x=>String(x.id)===String(id)); if(!c)return;
  crEditId=c.id; $("crFormTitle").textContent="تعديل دورة"; $("crSave").textContent="حفظ التعديل"; $("crCancel").style.display="";
  $("crName").value=c.name||""; $("crInstr").value=c.instructor_code||""; $("crStart").value=c.start_date||"";
  $("crSched").value=c.schedule||""; $("crPlace").value=c.place||""; $("crStatus").value=c.status||"active";
  const linked=CR_LINKS[c.id]||[]; document.querySelectorAll(".crStg").forEach(ch=>ch.checked=linked.includes(parseInt(ch.value)));
  try{window.scrollTo(0,0);}catch(e){}
}
async function crSave(){
  const name=$("crName").value.trim(); if(!name)return toast("اكتب اسم الدورة",1);
  const rec={name,instructor_code:$("crInstr").value||null,start_date:$("crStart").value||null,
    schedule:$("crSched").value.trim()||null,place:$("crPlace").value.trim()||null,status:$("crStatus").value};
  const stageIds=[...document.querySelectorAll(".crStg:checked")].map(c=>parseInt(c.value));
  if(crEditId!=null){
    if(!navigator.onLine)return toast("تعديل الدورة يحتاج اتصالا بالانترنت",1);
    const up=await sb.from("courses").update(rec).eq("id",crEditId); if(up.error)return toast("تعذر الحفظ: "+up.error.message,1);
    await sb.from("course_stages").delete().eq("course_id",crEditId);
    if(stageIds.length) await sb.from("course_stages").insert(stageIds.map(sid=>({course_id:crEditId,stage_id:sid})));
    toast("حدثت الدورة"); crCancelEdit(); await crReload(); return;
  }
  if(navigator.onLine){
    const ins=await sb.from("courses").insert(rec).select(); if(ins.error)return toast("تعذر الحفظ: "+ins.error.message,1);
    const cid=ins.data&&ins.data[0]&&ins.data[0].id;
    if(cid&&stageIds.length) await sb.from("course_stages").insert(stageIds.map(sid=>({course_id:cid,stage_id:sid})));
    toast("حفظت الدورة"); crClearForm(); await crReload();
  } else {
    await window.NumanQueue.insertOrQueue(sb,"courses",rec);
    CRS.unshift(Object.assign({id:"tmp_"+Date.now()},rec));
    toast("حفظت محليا — سترفع عند الاتصال (بدون ربط المراحل)"); crClearForm(); crRender();
  }
}
async function crDel(id){
  if(!confirm("حذف الدورة؟"))return;
  if(String(id).startsWith("tmp_")){ CRS=CRS.filter(x=>String(x.id)!==String(id)); crRender(); return toast("حذف"); }
  const res=await window.NumanQueue.delOrQueue(sb,"courses","id",id);
  CRS=CRS.filter(x=>String(x.id)!==String(id)); crRender();
  toast(res.online?"حذف":"حذف محليا — سيرفع عند عودة الاتصال");
}
async function crReload(){
  const cr=await sb.from("courses").select("*").order("id",{ascending:false}); CRS=cr.data||[];
  const ln=await sb.from("course_stages").select("*"); CR_LINKS={}; (ln.data||[]).forEach(l=>{(CR_LINKS[l.course_id]=CR_LINKS[l.course_id]||[]).push(l.stage_id);});
  try{ window.NumanQueue.cacheSet("d_courses_data",{staff:Object.keys(CR_STAFF).map(code=>({code,full_name:CR_STAFF[code]})),stages:CR_STAGES,courses:CRS,links:ln.data||[]}); }catch(e){}
  crRender();
}

async function enterApp(session){
  const r=await window.NumanQueue.committeeBoot(sb, session, COMMITTEE, "committee");
  if(r.err)return (errLogin(r.err),sb.auth.signOut());
  MYCODE=r.me.code; COM_ID=r.com.id; IS_LEAD=r.isLead;
  const isAdmin=r.isAdmin;
  $("hWho").textContent=r.me.full_name;
  $("hCom").childNodes[0].nodeValue="لجنة "+COMMITTEE+" ";
  $("roleBadge").textContent=isAdmin?"إدارة":(IS_LEAD?"مسؤول":"عضو");
  if(!IS_LEAD){ $("tabFacs").classList.add("hide"); }
  $("loginScreen").classList.add("hide");$("app").classList.remove("hide");
  if(COMMITTEE==="العلمية"){ await coursesBoot(); return; }
  if(COMMITTEE!=="الأنشطة"){
    document.querySelector(".tabrow").classList.add("hide");
    document.querySelector(".wrap").innerHTML='<div class="empty">شاشة لجنة «'+COMMITTEE+'» قيد الإنشاء.<br>سنبنيها قريبا بإذن الله.</div>';
    return;
  }
  const hqRes=await window.NumanQueue.load("committee_halaqat", async()=>{ const x=await sb.from("halaqat").select("id,name,stage_id"); if(x.error) throw x.error; return x.data||[]; });
  const stRes=await window.NumanQueue.load("committee_stages", async()=>{ const x=await sb.from("stages").select("id,name"); if(x.error) throw x.error; return x.data||[]; });
  const stName={}; (stRes.data||[]).forEach(s=>stName[s.id]=s.name);
  HALAQAS={}; HALAQA_STAGE={}; (hqRes.data||[]).forEach(h=>{HALAQAS[h.id]=h.name; HALAQA_STAGE[h.id]=stName[h.stage_id]||"";});
  await loadData();
}

async function loadData(){
  const R=await window.NumanQueue.load("committee_data", async()=>{
    const st=await sb.from("staff").select("code,full_name"); if(st.error) throw st.error;
    const f=await sb.from("facilities").select("*").order("id"); if(f.error) throw f.error;
    const rq=await sb.from("activity_requests").select("*").order("activity_date").order("time_text"); if(rq.error) throw rq.error;
    const rv=await sb.from("activity_reviews").select("*"); if(rv.error) throw rv.error;
    return {staff:st.data||[], facs:f.data||[], reqs:rq.data||[], reviews:rv.data||[]};
  });
  const b=R.data||{staff:[],facs:[],reqs:[],reviews:[]}; window.NumanQueue.banner(R.offline);
  STAFF={}; (b.staff||[]).forEach(s=>STAFF[s.code]=s.full_name);

}
async function loadTasks(){
  if(!COM_ID){TASKS=[];return;}
  const {data}=await sb.from("committee_tasks").select("*").eq("committee_id",COM_ID).order("id",{ascending:false});
  TASKS=data||[]; const open=TASKS.filter(t=>t.status==="open").length;
  const dot=$("notifDot"); if(dot){ dot.textContent=open; dot.classList.toggle("hide",open===0); }
}
function facName(id){const f=FACILITIES.find(x=>x.id===id);return f?f.name:"—";}
function staffName(code){return STAFF[code]||code;}
function overlap(a1,a2,b1,b2){return a1&&a2&&b1&&b2&&a1<b2&&b1<a2;}
function conflictsFor(r){
  const f=FACILITIES.find(x=>x.id===r.facility_id);
  if(!f||!f.conflictable)return [];
  return REQS.filter(o=>o.id!==r.id&&o.status==="approved"&&o.facility_id===r.facility_id&&o.activity_date===r.activity_date);
}
function reqDetail(r){
  const tm=esc(r.time_text||"");
  const L=[];
  L.push(`🗓 ${r.weekday?esc(r.weekday)+" · ":""}${r.activity_date||""}${tm?" · ⏰ "+tm:""}`);
  if(r.halaqa_id&&HALAQA_STAGE[r.halaqa_id]) L.push("المرحلة: "+esc(HALAQA_STAGE[r.halaqa_id]));
  if(r.student_count!=null) L.push("عدد الطلاب: "+r.student_count);
  if(r.participants) L.push("المحفظون: "+esc(r.participants));
  if(r.bring_items) L.push("سيحضر للطلاب: "+esc(r.bring_items));

  if(r.need_budget) L.push("📌 يطلب ميزانية من المركز"+(r.budget_details?": "+esc(r.budget_details):""));

function renderReqs(){
  const order={pending:0,rejected:1,approved:2};

    const cf=conflictsFor(r);
    const conf=cf.length?`<div class="conflict">⚠ تعارض على «${esc(facName(r.facility_id))}» مع نشاط مقبول في نفس اليوم</div>`:"";
    const note=r.decision_note?`<div class="notebox"><b>القرار:</b> ${esc(r.decision_note)}</div>`:"";

function renderSched(){
  const appr=REQS.filter(r=>r.status==="approved");
  if(!appr.length){$("schedList").innerHTML='<div class="empty">لا أنشطة مجدولة بعد.</div>';return;}
  const byDay={}; appr.forEach(r=>{(byDay[r.activity_date]=byDay[r.activity_date]||[]).push(r);});
  let html="";

    html+=`<div class="dayhdr">${day}</div>`;
    byDay[day].sort((a,b)=>(a.time_text||"")<(b.time_text||"")?-1:1).forEach(r=>{
      const clash=conflictsFor(r).length?"clash":"";
      const tm=esc(r.time_text||"—");
      const meta=[r.halaqa_id&&HALAQA_STAGE[r.halaqa_id]?"المرحلة: "+esc(HALAQA_STAGE[r.halaqa_id]):"", "المحفظ: "+esc(staffName(r.requested_by)), r.student_count!=null?r.student_count+" طالب":""].filter(Boolean).join(" · ");
      const rev=REVIEWS[r.id];
      const revflag=rev?`<span class="revdone" title="${esc(rev.suggestions||'')}">${rev.on_time===false?'⏰':''}${rev.has_violations?'⚠':''}${(rev.on_time&&!rev.has_violations)?'✓':'مراجع'}</span>`:"";
      const revbtn=IS_LEAD?`<button class="revbtn" onclick="openReview(${r.id})">📝 ${rev?'تعديل':'مراجعة'}</button>`:"";
      html+=`<div class="slot ${clash}"><div class="tm">${tm}</div><div class="info"><div class="n">${esc(KIND_AR[r.kind]||r.kind)} · ${esc(facName(r.facility_id))}</div><div class="s">${meta}</div></div>${revflag}${revbtn}</div>`;
    });

/* القرار */
let decId=null, decAction=null;
function openDecision(id,action){
  decId=id; decAction=action;
  const r=REQS.find(x=>x.id===id);
  $("decTitle").textContent=action==="approve"?"قبول الطلب":"رفض الطلب";
  $("decWho").textContent=(KIND_AR[r.kind]||r.kind)+" · "+facName(r.facility_id)+" — "+(r.activity_date||"");
  const cf=conflictsFor(r);

  $("decNoteLbl").textContent=action==="approve"?"ملاحظة القبول (اختيارية)":"ملاحظة الرفض (إلزامية)";
  $("decNote").value=""; $("decModal").classList.remove("hide");
}
async function confirmDecision(){
  const note=$("decNote").value.trim();
  if(decAction==="reject" && !note)return toast("ملاحظة الرفض إلزامية",1);
  const rec={status:decAction==="approve"?"approved":"rejected",decision_note:note||null,decided_by:MYCODE,decided_at:new Date().toISOString()};

/* التقارير الشمولية (عرض فقط) */
function revBadge(r){
  const rev=REVIEWS[r.id];
  if(!rev)return '<span class="as" style="color:#9aa3af">لم تراجع</span>';
  let s='';
  if(rev.on_time===true)s+='<span style="color:var(--good)">✓ في وقته</span>';
  if(rev.on_time===false)s+='<span style="color:var(--mid)">⏰ تأخر</span>';
  if(rev.has_violations)s+=' <span style="color:var(--bad)">⚠ مخالفات</span>';
  return '<span class="as">'+(s||'روجعت')+'</span>';
}
function actRowReport(r){
  const tm=esc(r.time_text||"");
  return `<div class="arow" style="cursor:pointer" onclick="openActivity(${r.id})"><div class="ai">
    <div class="an">${esc(KIND_AR[r.kind]||r.kind)} · ${esc(facName(r.facility_id))}</div>
    <div class="as">${r.activity_date||""}${tm?" · "+tm:""} · ${esc(staffName(r.requested_by))}${r.halaqa_id&&HALAQA_STAGE[r.halaqa_id]?" · "+esc(HALAQA_STAGE[r.halaqa_id]):""}</div>
    <div style="margin-top:3px">${revBadge(r)}</div></div><span class="eyebtn">👁</span></div>`;
}
function weekLabel(d){const dt=new Date(d+"T00:00");return "أسبوع "+Math.ceil(dt.getDate()/7)+" · شهر "+(dt.getMonth()+1);}
function isoWeek(d){const dt=new Date(d+"T00:00");const day=(dt.getUTCDay()+6)%7;dt.setUTCDate(dt.getUTCDate()-day+3);const f=new Date(Date.UTC(dt.getUTCFullYear(),0,4));const w=1+Math.round(((dt-f)/86400000-3+((f.getUTCDay()+6)%7))/7);return dt.getUTCFullYear()+" - أسبوع "+w;}
function renderReports(){
  // عمر فلتر النوع مرة واحدة
  if($("repType").options.length===0){
    $("repType").innerHTML='<option value="">كل الأنواع</option>'+Object.keys(KIND_AR).map(k=>`<option value="${k}">${KIND_AR[k]}</option>`).join("");
  }

  ).join(""):'<div class="empty">لا أنشطة مقبولة في هذا النطاق.</div>';

/* عرض تفصيلي للنشاط */
function drow(k,v){return v?`<div class="drow"><div class="k">${k}</div><div class="v">${v}</div></div>`:"";}
function openActivity(id){
  const r=REQS.find(x=>x.id===id); if(!r)return;
  $("actTitle").textContent=(KIND_AR[r.kind]||r.kind)+" · "+facName(r.facility_id);
  $("actSub").textContent=REQ_ST[r.status]+(r.activity_date?" · "+r.activity_date:"");
  let b="";
  b+=drow("المقدم",esc(staffName(r.requested_by)));
  b+=drow("الحلقة",r.halaqa_id?esc(HALAQAS[r.halaqa_id]||""):"");
  b+=drow("المرحلة",r.halaqa_id?esc(HALAQA_STAGE[r.halaqa_id]||""):"");
  b+=drow("اليوم/التاريخ",(r.weekday?esc(r.weekday)+" · ":"")+(r.activity_date||""));
  b+=drow("الوقت",r.time_text?esc(r.time_text):"");
  b+=drow("عدد الطلاب",r.student_count!=null?r.student_count:"");
  b+=drow("المحفظون المشاركون",r.participants?esc(r.participants):"");
  b+=drow("سيحضر للطلاب",r.bring_items?esc(r.bring_items):"");
  if(r.collected_money)b+=drow("جمع مال",esc(r.money_details||"نعم"));
  if(r.need_budget)b+=drow("يطلب ميزانية",esc(r.budget_details||"نعم"));
  if(r.need_supplies)b+=drow("يطلب أغراضا",esc(r.supplies_details||"نعم"));
  b+=drow("تفاصيل",r.details?esc(r.details):"");
  b+=drow("قرار اللجنة",r.decision_note?esc(r.decision_note):"");
  // المراجعة: المخالفات والملاحظات في صناديق منفصلة
  const rev=REVIEWS[r.id];
  if(rev){
    const onTime=rev.on_time===true?'<div class="dbox ok"><b>التنفيذ</b>تم في وقته ✓</div>':(rev.on_time===false?'<div class="dbox note"><b>التنفيذ</b>⏰ حصل تأخر</div>':'');
    b+=onTime;
    if(rev.has_violations)b+=`<div class="dbox viol"><b>⚠ المخالفات</b>${esc(rev.violations_text||"حصلت مخالفات")}</div>`;
    if(rev.suggestions)b+=`<div class="dbox note"><b>📝 مقترحات لأنشطة قادمة</b>${esc(rev.suggestions)}</div>`;
  } else {
    b+='<div class="dbox note">لم تجر مراجعة لهذا النشاط بعد.</div>';
  }
  $("actBody").innerHTML=b;
  $("actModal").classList.remove("hide");
}

/* المهام والإشعارات */
const NT_ST={open:"مفتوحة",done:"مكتملة",deferred:"مؤجلة",rejected:"مرفوضة"};
function openNotif(){ renderNotif(); $("notifModal").classList.remove("hide"); }
function renderNotif(){
  $("notifBody").innerHTML=TASKS.length?TASKS.map(t=>{
    const acts=t.status==="open"?`<div class="nt-acts">
      <button class="bd" onclick="respondTask(${t.id},'done')">مكتملة</button>
      <button class="bf" onclick="respondTask(${t.id},'deferred')">تأجيل</button>
      <button class="br" onclick="respondTask(${t.id},'rejected')">رفض</button></div>`:
      `<button class="eyebtn" style="margin-top:8px" onclick="respondTask(${t.id},'reopen')">إعادة فتح</button>`;
    return `<div class="ntask"><div style="display:flex;justify-content:space-between;gap:8px;align-items:center">
      <span class="nt-t">${esc(t.title)}</span><span class="nt-pill ${t.status}">${NT_ST[t.status]||t.status}</span></div>
      ${t.details?`<div class="nt-d">${esc(t.details)}</div>`:""}
      ${t.reply?`<div class="nt-rep"><b>ردكم:</b> ${esc(t.reply)}</div>`:""}
      ${acts}</div>`;
  }).join(""):'<div class="empty">لا مهام مسندة حاليا.</div>';
}
async function respondTask(id,status){
  let reply=null;
  if(status==="deferred"||status==="rejected"){
    reply=prompt(status==="deferred"?"سبب التأجيل / ردكم:":"سبب الرفض / ردكم:");
    if(reply===null)return; // ألغي
  } else if(status==="done"){
    reply=prompt("رد/ملاحظة عند الإكمال (اختياري):")||null;
  } else if(status==="reopen"){ status="open"; }
  const upd={status,responded_by:MYCODE,responded_at:new Date().toISOString()};
  if(reply!==null) upd.reply=reply;
  const {error}=await sb.from("committee_tasks").update(upd).eq("id",id);
  if(error)return toast("تعذر الحفظ: "+error.message,1);
  toast("تم التحديث"); await loadTasks(); renderNotif();
}

/* المراجعة */
let revReqId=null;
function openReview(id){
  revReqId=id; const r=REQS.find(x=>x.id===id), rev=REVIEWS[id];
  const _today=new Date().toLocaleDateString("en-CA");
  if(r&&r.activity_date&&r.activity_date>_today)return toast("لا يمكن مراجعة النشاط قبل موعده ("+r.activity_date+")",1);
  $("revWho").textContent=(KIND_AR[r.kind]||r.kind)+" · "+facName(r.facility_id)+" — "+(r.activity_date||"");
  $("revOnTime").querySelectorAll(".segb").forEach(b=>b.classList.toggle("on", rev && ((b.dataset.v==="yes")===(rev.on_time===true)) && rev.on_time!=null));
  $("revViol").checked=!!(rev&&rev.has_violations); $("revViolWrap").classList.toggle("hide",!(rev&&rev.has_violations));
  $("revViolText").value=rev?(rev.violations_text||""):""; $("revNotes").value=rev?(rev.suggestions||""):"";
  $("revModal").classList.remove("hide");
}
async function saveReview(){
  const sel=$("revOnTime").querySelector(".segb.on");
  const on_time = sel? (sel.dataset.v==="yes") : null;
  const viol=$("revViol").checked;
  const rec={request_id:revReqId,on_time,has_violations:viol,
    violations_text:viol?($("revViolText").value.trim()||null):null,
    suggestions:$("revNotes").value.trim()||null,reviewed_by:MYCODE,reviewed_at:new Date().toISOString()};
  const {error}=await sb.from("activity_reviews").upsert(rec,{onConflict:"request_id"});
  if(error)return toast("تعذر الحفظ: "+error.message,1);
  $("revModal").classList.add("hide"); toast("حفظت المراجعة"); await loadData();
}

/* المرافق (للمسؤول) */
function renderFacs(){
  $("facList").innerHTML=FACILITIES.length?FACILITIES.map(f=>`<div class="facrow">
    <div><b>${esc(f.name)}</b> ${f.conflictable?'<span class="miniflag">قابل للتعارض</span>':'<span class="miniflag">واسع</span>'}${f.active?"":' <span class="miniflag" style="background:#fbe9e9;color:#a23a3a">معطل</span>'}</div>

async function addFacility(){

<script>
(function(){
  let scanner=null,lastC=null,lastT=0;
  function loadOnce(src){return new Promise((res,rej)=>{const s=document.createElement("script");s.src=src;s.async=true;s.onload=()=>res();s.onerror=()=>{s.remove();rej();};document.head.appendChild(s);});}
  async function ensureScan(){ if(window.Html5Qrcode)return true;
    for(const u of ["lib/html5-qrcode.min.js","https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js","https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"]){ try{await loadOnce(u); if(window.Html5Qrcode)return true;}catch(e){} } return !!window.Html5Qrcode; }
  function showRes(t,ok){const r=document.getElementById("scanRes");r.textContent=t;r.style.display="block";r.style.background=ok?"#E6F1EA":"#FBE9E9";r.style.color=ok?"#1E7A48":"#B23B3B";}
  window.openScan=async function(){
    document.getElementById("scanModal").classList.add("show");
    document.getElementById("scanRes").style.display="none";
    if(!(await ensureScan())){ showRes("تعذر تحميل الماسح — حدث الصفحة",false); return; }
    try{ scanner=new Html5Qrcode("scanReader");
      await scanner.start({facingMode:"environment"},{fps:10,qrbox:{width:220,height:220}},onScan,()=>{});
    }catch(e){ showRes("تعذر فتح الكاميرا — اسمح بالوصول",false); }
  };
  window.closeScan=function(){ document.getElementById("scanModal").classList.remove("show"); if(scanner){try{scanner.stop().then(()=>scanner.clear()).catch(()=>{});}catch(e){} scanner=null;} };
  async function onScan(text){
    const code=String(text).trim().toUpperCase(); const now=Date.now();
    if(code===lastC&&now-lastT<2500)return; lastC=code;lastT=now;
    const date=new Date().toLocaleDateString("en-CA"), checkin=new Date().toISOString();
    let res; try{ res=await window.NumanQueue.record(sb,code,date,checkin); }catch(e){ res={online:false}; }
    if(!res.online){ showRes("✓ سجل محليا — سيرفع تلقائيا عند عودة الاتصال", true); return; }
    const data=res.data;
    if(!data||!data.length){showRes(code+" غير موجود",false);return;}
    const r=data[0]; const who=(r.kind==="staff"?"المحفظ ":"")+r.full_name;
    const map={present:"✓ حاضر",late:"⏰ متأخر",absent:"✗ غائب"};
    showRes((map[r.status]||"✓ حاضر")+": "+who, r.status!=="absent");
  }
  // أظهر زر المسح بعد الدخول (كل هذه الصفحات لغير الطلاب)
  let n=0;const t=setInterval(()=>{ if(++n>80){clearInterval(t);return;}
    if(typeof sb==="undefined"||!sb)return;
    const app=document.getElementById("app"); const fab=document.getElementById("scanFab"); if(!fab)return;
    const loggedIn = app ? !app.classList.contains("hide") : true;
    if(loggedIn) fab.classList.add("show"); else fab.classList.remove("show");
  },400);
})();
</script>
